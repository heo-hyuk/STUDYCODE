<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login</title>
</head>
<body class="bg-slate-50">
<div class="max-w-md mx-auto p-4 md:p-8">
    <div class="rounded-2xl bg-white shadow p-6 md:p-8">
        <h2 class="text-xl md:text-2xl font-bold">로그인(초간단)</h2>
        <p class="mt-2 text-slate-600 text-sm">
            이름만 입력하면 서버 메모리(boolean)에 로그인 상태가 저장됩니다.
        </p>

        <form action="/login" method="post" class="mt-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">이름</label>
                <input name="name" placeholder="예: 루니"
                       class="mt-2 w-full rounded-xl border border-slate-200 px-3 py-2
                        focus:outline-none focus:ring-2 focus:ring-violet-300"/>
            </div>

            <button type="submit"
                    class="w-full rounded-xl bg-violet-500 py-2 text-white hover:bg-violet-400">
                로그인
            </button>
        </form>

        <div class="mt-6 text-sm">
            <a href="/" class="text-slate-600 hover:underline">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
